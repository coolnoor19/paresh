
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Image</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            width:100%;
            overflow-x:hidden;
            background:#fff;
        }

        .image-container{
            width:100%;
        }

        .image-container img{
            width:100%;
            height:auto;
            display:block;
            max-width:100%;
        }

        /* Tablet */
        @media (max-width:992px){
            .image-container img{
                width:100%;
                height:auto;
            }
        }

        /* Mobile */
        @media (max-width:576px){
            .image-container img{
                width:100%;
                height:auto;
            }
        }
    </style>
</head>
<body>

    <div class="image-container">
        <img src="./WhatsApp Image 2026-07-22 at 21.32.33.jpeg" alt="Website Screenshot">
    </div>

</body>
</html>
